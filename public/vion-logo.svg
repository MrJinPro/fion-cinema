<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E054"/>
      <stop offset="100%" stop-color="#00D444"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- V -->
  <path d="M20 15 L30 45 L40 15" stroke="url(#orangeGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- i -->
  <rect x="55" y="15" width="4" height="30" fill="url(#orangeGradient)" filter="url(#glow)"/>
  <circle cx="57" cy="10" r="2" fill="url(#orangeGradient)" filter="url(#glow)"/>
  
  <!-- O with play button -->
  <circle cx="87" cy="30" r="15" stroke="url(#greenGradient)" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M82 25 L82 35 L92 30 Z" fill="url(#greenGradient)" filter="url(#glow)"/>
  
  <!-- N -->
  <path d="M120 45 L120 15 L140 45 L140 15" stroke="url(#blueGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>